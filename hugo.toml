baseURL = "https://smartdigital.dk/"
languageCode = "da"
title = "SmartDigital"
theme = "hugo-universal-theme"
defaultContentLanguage = "da"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  style = "default"
  logo = "img/logo.png"
  logo_small = "img/logo-small.png"
  description = "Uafhængige anmeldelser og guides inden for AI, produktivitet, biohacking og tech"
  author = "SmartDigital"
  date_format = "2. January 2006"
  copyright = '<p>© 2026 SmartDigital. Alle rettigheder forbeholdes.</p>'

  # Klaviyo – erstat med din rigtige Public API Key fra Klaviyo dashboard
  klaviyoPublicKey = "KLAVIYO_PUBLIC_KEY"

  # Affiliate disclosure (vises øverst på affiliate-artikler)
  affiliateDisclosure = "Denne side indeholder affiliate-links. Jeg modtager evt. en kommission, hvis du køber via mine links – uden ekstra omkostninger for dig."

  [params.topbar]
    enable = false

  [params.CarouselHomepage]
    enable = true
    auto_play = true

  [params.features]
    enable = true
    cols = 4

  [params.testimonials]
    enable = false

  [params.see_more]
    enable = false

  [params.clients]
    enable = false

  [params.recent_posts]
    enable = true
    title = "Seneste artikler"
    subtitle = "Guides, anmeldelser og toplister"
    hide_summary = false

  [params.footer.recent_posts]
    enable = true

  [params.footer.about_us]
    enable = true
    title = "SmartDigital"
    subtitle = "Uafhængige anmeldelser og guides til smarte digitale valg inden for AI, produktivitet og biohacking."

  [params.footer.contact]
    enable = false

  [params.widgets]
    categories = true
    tags = true
    search = false

[menu]
  [[menu.main]]
    name = "AI & Tools"
    url = "/ai-tools/"
    weight = 1
  [[menu.main]]
    name = "Produktivitet"
    url = "/produktivitet/"
    weight = 2
  [[menu.main]]
    name = "Biohacking"
    url = "/biohacking/"
    weight = 3
  [[menu.main]]
    name = "Livsstil & Tech"
    url = "/livsstil-tech/"
    weight = 4
  [[menu.main]]
    name = "Om mig"
    url = "/om-mig/"
    weight = 5
  [[menu.main]]
    name = "Nyhedsbrev"
    url = "/nyhedsbrev/"
    weight = 6

[taxonomies]
  tag = "tags"
  category = "categories"
  type = "types"

[outputs]
  home = ["HTML", "RSS"]

[minify]
  disableXML = true
  minifyOutput = true
