baseURL = "https://smartdigital.dk/"
title = "SmartDigital"
theme = "hugo-universal-theme"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

defaultContentLanguage = "da"
defaultContentLanguageInSubdir = true

# ── Shared params ──────────────────────────────────────────
[params]
  style = "default"
  logo = "img/logo.png"
  logo_small = "img/logo-small.png"
  author = "SmartDigital"
  klaviyoPublicKey = "KLAVIYO_PUBLIC_KEY"

  [params.topbar]
    enable = false

  [params.CarouselHomepage]
    enable = true
    auto_play = true

  [params.features]
    enable = true
    cols = 4

  [params.testimonials]
    enable = false

  [params.see_more]
    enable = false

  [params.clients]
    enable = false

  [params.footer.recent_posts]
    enable = true

  [params.footer.contact]
    enable = false

  [params.widgets]
    categories = true
    tags = true
    search = false

# ── Danish ──────────────────────────────────────────────────
[languages.da]
  languageCode = "da"
  languageName = "Dansk"
  weight = 1
  contentDir = "content/da"

  [languages.da.params]
    description = "Uafhængige anmeldelser og guides inden for AI, produktivitet, biohacking og tech"
    date_format = "2. January 2006"
    copyright = '<p>© 2026 SmartDigital. Alle rettigheder forbeholdes.</p>'
    affiliateDisclosure = "Denne side indeholder affiliate-links. Jeg modtager evt. en kommission, hvis du køber via mine links – uden ekstra omkostninger for dig."

    [languages.da.params.recent_posts]
      enable = true
      title = "Seneste artikler"
      subtitle = "Guides, anmeldelser og toplister"
      hide_summary = false

    [languages.da.params.footer.about_us]
      enable = true
      title = "SmartDigital"
      subtitle = "Uafhængige anmeldelser og guides til smarte digitale valg inden for AI, produktivitet og biohacking."

  [[languages.da.menu.main]]
    name = "AI & Tools"
    url = "/da/ai-tools/"
    weight = 1
  [[languages.da.menu.main]]
    name = "Produktivitet"
    url = "/da/produktivitet/"
    weight = 2
  [[languages.da.menu.main]]
    name = "Biohacking"
    url = "/da/biohacking/"
    weight = 3
  [[languages.da.menu.main]]
    name = "Livsstil & Tech"
    url = "/da/livsstil-tech/"
    weight = 4
  [[languages.da.menu.main]]
    name = "Om mig"
    url = "/da/om-mig/"
    weight = 5
  [[languages.da.menu.main]]
    name = "Nyhedsbrev"
    url = "/da/nyhedsbrev/"
    weight = 6

# ── English ─────────────────────────────────────────────────
[languages.en]
  languageCode = "en"
  languageName = "English"
  weight = 2
  contentDir = "content/en"

  [languages.en.params]
    description = "Independent reviews and guides for AI, productivity, biohacking and tech"
    date_format = "January 2, 2006"
    copyright = '<p>© 2026 SmartDigital. All rights reserved.</p>'
    affiliateDisclosure = "This page contains affiliate links. I may earn a commission if you purchase via my links – at no extra cost to you."

    [languages.en.params.recent_posts]
      enable = true
      title = "Latest articles"
      subtitle = "Guides, reviews and top lists"
      hide_summary = false

    [languages.en.params.footer.about_us]
      enable = true
      title = "SmartDigital"
      subtitle = "Independent reviews and guides for smart digital choices in AI, productivity and biohacking."

  [[languages.en.menu.main]]
    name = "AI & Tools"
    url = "/en/ai-tools/"
    weight = 1
  [[languages.en.menu.main]]
    name = "Productivity"
    url = "/en/productivity/"
    weight = 2
  [[languages.en.menu.main]]
    name = "Biohacking"
    url = "/en/biohacking/"
    weight = 3
  [[languages.en.menu.main]]
    name = "Lifestyle & Tech"
    url = "/en/lifestyle-tech/"
    weight = 4
  [[languages.en.menu.main]]
    name = "About"
    url = "/en/about/"
    weight = 5
  [[languages.en.menu.main]]
    name = "Newsletter"
    url = "/en/newsletter/"
    weight = 6

# ── Taxonomies & outputs ────────────────────────────────────
[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS"]

[minify]
  disableXML = true
  minifyOutput = true
