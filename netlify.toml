[build]
  publish = "public"
  command = "git submodule update --init --recursive && hugo --minify"

[build.environment]
  HUGO_VERSION = "0.147.0"
  HUGO_ENV = "production"

# Affiliate redirect-links via /go/produkt-navn
# Tilføj en linje per produkt du linker til via PartnerStack
# Eksempel:
# [[redirects]]
#   from = "/go/notion"
#   to = "https://app.partnerstack.com/application/notion?referral=DITREFERRALID"
#   status = 302
#
# [[redirects]]
#   from = "/go/chatgpt"
#   to = "https://app.partnerstack.com/application/openai?referral=DITREFERRALID"
#   status = 302

# Language auto-detect on root – English browsers → /en/, everyone else → /da/
[[redirects]]
  from = "/"
  to = "/en/"
  status = 302
  conditions = {Language = ["en", "en-US", "en-GB", "en-AU", "en-CA", "en-NZ"]}

[[redirects]]
  from = "/"
  to = "/da/"
  status = 302

# 404
[[redirects]]
  from = "/*"
  to = "/da/404.html"
  status = 404
